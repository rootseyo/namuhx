  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font-sans);
    background: var(--surface-page);
    color: var(--text-body);
    -webkit-font-smoothing: antialiased;
  }
  a { color: inherit; }
  ::selection { background: var(--ws-mint); color: var(--ws-black); }
  @keyframes hf-pop { from { opacity: 0; transform: translateX(-50%) translateY(-6px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
  @keyframes hf-box { 0% { opacity: 0; transform: scale(1.04); } 55% { opacity: 1; } 100% { opacity: 1; transform: scale(1); } }
  @keyframes hf-mark { from { opacity: 0; transform: scale(.8); } to { opacity: 1; transform: scale(1); } }
  @keyframes hf-ring { 0% { transform: scale(.7); opacity: .75; } 70% { transform: scale(1.6); opacity: 0; } 100% { opacity: 0; } }
  @keyframes rb-cta { 0%,100% { box-shadow: 0 14px 40px rgba(133,225,210,.45); } 50% { box-shadow: 0 16px 52px rgba(133,225,210,.75); } }
  @keyframes rb-cta-ring { 0% { transform: scale(1); opacity: .55; } 70% { transform: scale(1.18); opacity: 0; } 100% { opacity: 0; } }
  @keyframes rb-cta-arrow { 0%,100% { transform: translateY(0); } 50% { transform: translateY(3px); } }
  @keyframes rb-pulse { 0% { transform: scale(.82); opacity: 0; } 24% { opacity: .9; } 100% { transform: scale(1.18); opacity: 0; } }
  @keyframes rb-blink { 0%,92%,100% { transform: scaleY(1); } 96% { transform: scaleY(.1); } }
  @keyframes rb-scan { 0% { top: 10%; } 50% { top: 86%; } 100% { top: 10%; } }
  @keyframes rb-rise { from { transform: translateY(4px); opacity: .55; } to { transform: translateY(-3px); opacity: 1; } }
  @keyframes rb-node { 0% { transform: translate(-50%,-50%) scale(.6); opacity: .35; } 40% { transform: translate(-50%,-50%) scale(1.25); opacity: 1; } 100% { transform: translate(-50%,-50%) scale(1); opacity: .9; } }
