<style>
  html, body { margin: 0; padding: 0; }
  body { font-family: var(--font-sans); background: #ededed; color: var(--text-body); -webkit-font-smoothing: antialiased; }
  * { box-sizing: border-box; }
  a { color: inherit; text-decoration: none; }
  ::selection { background: var(--ws-mint); color: var(--ws-black); }

  @keyframes tb-rise { from { opacity: 0; transform: translateY(26px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes tb-pop  { from { opacity: 0; transform: scale(.82); } to { opacity: 1; transform: scale(1); } }
  @keyframes tb-heroRobot { from { opacity: 0; transform: translateY(28px) scale(1.04); } to { opacity: 1; transform: translateY(0) scale(1); } }
  @keyframes tb-fade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes tb-modalIn { from { opacity: 0; transform: translateY(18px) scale(.985); } to { opacity: 1; transform: translateY(0) scale(1); } }
  @keyframes tb-eq { 0%,100% { transform: scaleY(.92); } 50% { transform: scaleY(.64); } }

  /* reveal-on-scroll */
  .reveal { opacity: 0; }
  .reveal.in { animation: tb-rise .8s cubic-bezier(.22,.61,.36,1) both; }
  .reveal.in.d1 { animation-delay: .08s; }
  .reveal.in.d2 { animation-delay: .16s; }
  .reveal.in.d3 { animation-delay: .24s; }
  .reveal.in.d4 { animation-delay: .32s; }
  .reveal.in.d5 { animation-delay: .40s; }

  @media (prefers-reduced-motion: reduce) {
    .reveal { opacity: 1 !important; animation: none !important; }
    .tb-eqbar { animation: none !important; }
  }
</style>
